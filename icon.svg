<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243830"/>
      <stop offset="1" stop-color="#1A2820"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so the icon looks right when the OS masks it round -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- subtle warm glow, top-left -->
  <circle cx="150" cy="140" r="230" fill="#E39A2E" fill-opacity="0.10"/>
  <!-- the four operations: honey + green, the app's own two accent colors -->
  <g font-family="'SF Pro Rounded','Arial Rounded MT Bold',system-ui,sans-serif" font-weight="800" text-anchor="middle">
    <text x="172" y="190" font-size="170" fill="#EFA63E" dominant-baseline="central">+</text>
    <text x="340" y="190" font-size="170" fill="#5CC08C" dominant-baseline="central">&#215;</text>
    <text x="172" y="326" font-size="170" fill="#5CC08C" dominant-baseline="central">&#8722;</text>
    <text x="340" y="326" font-size="170" fill="#EFA63E" dominant-baseline="central">&#247;</text>
  </g>
</svg>
